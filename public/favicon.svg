<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Radial Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#14172a"/>
      <stop offset="60%" stop-color="#0a0c16"/>
      <stop offset="100%" stop-color="#05060a"/>
    </radialGradient>

    <!-- Radial Glow Behind Logo -->
    <radialGradient id="ambientGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#7000ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Neon Gradients -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3bf6ff"/>
      <stop offset="100%" stop-color="#0072ff"/>
    </linearGradient>

    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec3eff"/>
      <stop offset="100%" stop-color="#6a00ff"/>
    </linearGradient>

    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3b93"/>
      <stop offset="100%" stop-color="#b000ff"/>
    </linearGradient>

    <!-- Flow Ribbon Gradient (Cyan -> Magenta -> Purple) -->
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#ff00cc"/>
      <stop offset="100%" stop-color="#7000ff"/>
    </linearGradient>

    <!-- Specular Gloss Reflection -->
    <linearGradient id="glassShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="30%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="30.1%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Metallic Gold (Buckle) -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8be"/>
      <stop offset="30%" stop-color="#ffd700"/>
      <stop offset="70%" stop-color="#c59b00"/>
      <stop offset="100%" stop-color="#ffb700"/>
    </linearGradient>

    <!-- Chip Contact Pattern -->
    <pattern id="chipPattern" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="5" height="5" fill="none" stroke="#6a4c00" stroke-width="0.5"/>
    </pattern>

    <!-- Glowing Filters -->
    <filter id="superGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur1" />
      <feGaussianBlur stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glassFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- 1. Background Canvas -->
  <rect width="500" height="500" rx="48" fill="url(#bgGrad)"/>
  
  <!-- 2. Ambient Light Background -->
  <circle cx="250" cy="250" r="220" fill="url(#ambientGlow)"/>

  <!-- Decorative Tech Circles in Background -->
  <circle cx="250" cy="250" r="180" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1.5" stroke-dasharray="10, 15"/>
  <circle cx="250" cy="250" r="140" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>

  <!-- 3. Central Multi-Lane S-Curve (The Cash/Data Flow) -->
  <!-- Back thick glow -->
  <path d="M 335 180 C 130 180, 150 305, 315 305 C 375 305, 315 390, 205 390" 
        fill="none" stroke="url(#flowGrad)" stroke-width="32" stroke-linecap="round" opacity="0.6" filter="url(#superGlow)"/>
  <!-- Middle pink line -->
  <path d="M 335 180 C 130 180, 150 305, 315 305 C 375 305, 315 390, 205 390" 
        fill="none" stroke="url(#neonPink)" stroke-width="18" stroke-linecap="round" opacity="0.8"/>
  <!-- Core bright white-cyan line -->
  <path d="M 335 180 C 130 180, 150 305, 315 305 C 375 305, 315 390, 205 390" 
        fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.9" filter="url(#glassFilter)"/>

  <!-- 4. Top Credit Card (S's Top Loop) -->
  <g transform="translate(305, 140) rotate(-20) translate(-100, -60)">
    <!-- Ambient Glow behind card -->
    <rect x="-5" y="-5" width="210" height="130" rx="20" fill="url(#neonCyan)" opacity="0.3" filter="url(#superGlow)"/>
    <!-- Main Glass Body -->
    <rect x="0" y="0" width="200" height="120" rx="16" fill="url(#neonCyan)" fill-opacity="0.55" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" filter="url(#glassFilter)"/>
    <!-- Specular Gloss overlay -->
    <rect x="0" y="0" width="200" height="120" rx="16" fill="url(#glassShine)"/>
    
    <!-- Card Details -->
    <!-- Magnetic/Dark bar -->
    <rect x="0" y="20" width="200" height="22" fill="#080a12" fill-opacity="0.85"/>
    
    <!-- Chip -->
    <g transform="translate(20, 60)">
      <rect width="32" height="24" rx="4" fill="url(#goldGrad)"/>
      <!-- Grid lines on chip -->
      <rect x="2" y="2" width="28" height="20" rx="2" fill="url(#chipPattern)" opacity="0.7"/>
      <path d="M 16 0 L 16 24 M 0 12 L 32 12" stroke="#6a4c00" stroke-width="0.5"/>
    </g>

    <!-- Holographic badge -->
    <circle cx="160" cy="80" r="16" fill="url(#neonPurple)" fill-opacity="0.4" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <circle cx="172" cy="80" r="16" fill="url(#neonCyan)" fill-opacity="0.4" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    
    <!-- Tech Abstract Wave Lines on Card -->
    <path d="M 60 70 Q 90 60, 120 75 T 180 65" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <path d="M 60 80 Q 90 70, 120 85 T 180 75" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    
    <!-- Text Lines -->
    <rect x="20" y="96" width="60" height="5" rx="1" fill="#ffffff" fill-opacity="0.6"/>
  </g>

  <!-- 5. Bottom Wallet (S's Bottom Loop) -->
  <g transform="translate(95, 305) rotate(4)">
    <!-- Ambient Glow behind wallet -->
    <rect x="-5" y="-5" width="220" height="140" rx="28" fill="url(#neonPurple)" opacity="0.35" filter="url(#superGlow)"/>
    <!-- Wallet Body (Back plate) -->
    <rect x="0" y="0" width="210" height="130" rx="24" fill="url(#neonPurple)" fill-opacity="0.6" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" filter="url(#glassFilter)"/>
    <!-- Specular Gloss overlay -->
    <rect x="0" y="0" width="210" height="130" rx="24" fill="url(#glassShine)"/>
    
    <!-- Nested Card slots (visible inside wallet mouth) -->
    <rect x="20" y="-12" width="110" height="30" rx="6" fill="url(#neonCyan)" fill-opacity="0.8" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    <rect x="35" y="-20" width="100" height="30" rx="6" fill="url(#neonPink)" fill-opacity="0.8" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
    
    <!-- Wallet Front Plate -->
    <!-- Using a curved path to simulate open leather pocket -->
    <path d="M 0 45 Q 105 25, 210 35 L 210 130 Q 105 135, 0 130 Z" fill="url(#neonPurple)" fill-opacity="0.8" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    
    <!-- Specular gloss for front plate -->
    <path d="M 0 45 Q 105 25, 210 35 L 210 130 Q 105 135, 0 130 Z" fill="url(#glassShine)" opacity="0.7"/>

    <!-- Double Stitching Lines around Wallet Edge -->
    <path d="M 6 48 Q 105 29, 204 39 L 204 124 Q 105 129, 6 124 Z" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="4,3"/>
    <path d="M 10 51 Q 105 33, 200 42 L 200 120 Q 105 125, 10 120 Z" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="2,2"/>

    <!-- Gold Buckle Strap -->
    <!-- The strap wraps around the open wallet -->
    <g transform="translate(160, 50)">
      <!-- Strap Shadow -->
      <path d="M 0 5 L 45 5 C 55 5, 55 35, 45 35 L 0 35 Z" fill="#05060b" opacity="0.4"/>
      <!-- Strap Body -->
      <path d="M 0 0 L 45 0 C 55 0, 55 30, 45 30 L 0 30 Z" fill="#0a0d18" fill-opacity="0.9" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
      <!-- Gold Snap Button -->
      <circle cx="35" cy="15" r="9" fill="url(#goldGrad)" stroke="#ffffff" stroke-width="0.75" filter="url(#glassFilter)"/>
      <circle cx="35" cy="15" r="4" fill="#584100" opacity="0.3"/>
      <!-- Small stitching on strap -->
      <path d="M 0 3 L 43 3 C 50 3, 50 27, 43 27 L 0 27" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-dasharray="3,2"/>
    </g>
  </g>

</svg>
