<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Slate -->
    <rect id="bg" width="500" height="500" rx="40" fill="#08090f"/>
    
    <!-- Gradients -->
    <linearGradient id="cyanNeon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0072ff"/>
    </linearGradient>

    <linearGradient id="purpleNeon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d400ff"/>
      <stop offset="100%" stop-color="#6a00ff"/>
    </linearGradient>

    <!-- Glowing ribbon gradient (representing transaction history/receipt) -->
    <linearGradient id="receiptGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="40%" stop-color="#7000ff"/>
      <stop offset="85%" stop-color="#d400ff"/>
      <stop offset="100%" stop-color="#ff3b93"/>
    </linearGradient>

    <!-- Metallic Gold -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff8be"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff9900"/>
    </linearGradient>

    <!-- Glass Specular -->
    <linearGradient id="glassShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="superGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur1" />
      <feGaussianBlur stdDeviation="6" result="blur2" />
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <use href="#bg"/>

  <!-- Analytics/Grid Background Accents -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="50" y1="0" x2="50" y2="500"/>
    <line x1="150" y1="0" x2="150" y2="500"/>
    <line x1="250" y1="0" x2="250" y2="500"/>
    <line x1="350" y1="0" x2="350" y2="500"/>
    <line x1="450" y1="0" x2="450" y2="500"/>
    <line x1="0" y1="50" x2="500" y2="50"/>
    <line x1="0" y1="150" x2="500" y2="150"/>
    <line x1="0" y1="250" x2="500" y2="250"/>
    <line x1="0" y1="350" x2="500" y2="350"/>
    <line x1="0" y1="450" x2="500" y2="450"/>
  </g>

  <!-- Logo Group -->
  <g transform="translate(0, 0)">
    
    <!-- 1. Ambient Background Glow -->
    <path d="M 330 160 C 180 160, 160 250, 340 250 C 480 250, 320 340, 170 340" 
          fill="none" stroke="url(#receiptGrad)" stroke-width="48" stroke-linecap="round" opacity="0.2" filter="url(#superGlow)"/>

    <!-- 2. Transaction Receipt Ribbon (The central flow of the S) -->
    <!-- Represents the paper trail of expenses made -->
    <path d="M 330 160 C 180 160, 160 250, 340 250 C 480 250, 320 340, 170 340" 
          fill="none" stroke="url(#receiptGrad)" stroke-width="24" stroke-linecap="round" filter="url(#superGlow)"/>
    <!-- Highlight core line -->
    <path d="M 330 160 C 180 160, 160 250, 340 250 C 480 250, 320 340, 170 340" 
          fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.75"/>
          
    <!-- Segment lines on the ribbon representing expense items/ledger lines -->
    <path d="M 270 178 L 260 188" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 230 200 L 220 210" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 245 240 L 255 245" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 285 260 L 295 255" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 315 285 L 305 295" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>

    <!-- 3. Top Credit Card (Releasing the payment flow) -->
    <g transform="translate(305, 140) rotate(-18) translate(-100, -60)">
      <!-- Card Glow -->
      <rect x="0" y="0" width="190" height="114" rx="14" fill="url(#cyanNeon)" opacity="0.3" filter="url(#superGlow)"/>
      <!-- Glass Body -->
      <rect x="0" y="0" width="190" height="114" rx="14" fill="url(#cyanNeon)" fill-opacity="0.6" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
      <rect x="0" y="0" width="190" height="114" rx="14" fill="url(#glassShine)"/>
      <!-- Magnetic Stripe -->
      <rect x="0" y="18" width="190" height="20" fill="#080a12" fill-opacity="0.85"/>
      <!-- Gold Chip -->
      <rect x="20" y="55" width="28" height="20" rx="3" fill="url(#goldGrad)"/>
      <circle cx="160" cy="75" r="12" fill="#ffffff" fill-opacity="0.15"/>
    </g>

    <!-- 4. Bottom Leather Wallet (Logging the expenses) -->
    <g transform="translate(95, 305) rotate(3)">
      <!-- Wallet Glow -->
      <rect x="0" y="0" width="210" height="130" rx="24" fill="url(#purpleNeon)" opacity="0.35" filter="url(#superGlow)"/>
      <!-- Wallet Back Body -->
      <rect x="0" y="0" width="210" height="130" rx="24" fill="url(#purpleNeon)" fill-opacity="0.65" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <!-- Front pocket -->
      <path d="M 0 45 Q 105 25, 210 35 L 210 130 Q 105 135, 0 130 Z" fill="url(#purpleNeon)" fill-opacity="0.85" stroke="rgba(255,255,255,0.2)" stroke-width="1" rx="24"/>
      <path d="M 0 45 Q 105 25, 210 35 L 210 130 Q 105 135, 0 130 Z" fill="url(#glassShine)" opacity="0.6"/>
      <!-- Double Stitching -->
      <path d="M 6 48 Q 105 29, 204 39 L 204 124 Q 105 129, 6 124 Z" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1" stroke-dasharray="3,3"/>
      <!-- Gold buckle clasp -->
      <g transform="translate(160, 50)">
        <path d="M 0 0 L 45 0 C 55 0, 55 30, 45 30 L 0 30 Z" fill="#0c0f18" fill-opacity="0.9" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
        <circle cx="35" cy="15" r="8" fill="url(#goldGrad)" filter="url(#superGlow)"/>
        <circle cx="35" cy="15" r="3" fill="#ffffff" opacity="0.8"/>
      </g>
    </g>

    <!-- 5. Floating Coins along the flow path (Representing micro-transactions) -->
    <circle cx="210" cy="190" r="10" fill="url(#goldGrad)" filter="url(#superGlow)"/>
    <circle cx="210" cy="190" r="6" fill="#ffffff" opacity="0.6"/>
    
    <circle cx="290" cy="310" r="8" fill="url(#goldGrad)" filter="url(#superGlow)"/>
    
    <circle cx="150" cy="270" r="6" fill="url(#goldGrad)" opacity="0.8"/>

  </g>
</svg>
